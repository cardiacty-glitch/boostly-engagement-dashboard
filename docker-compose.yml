services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: engagement_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/000_init.sql:/docker-entrypoint-initdb.d/000_init.sql
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./sql/002_views.sql:/docker-entrypoint-initdb.d/002_views.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d engagement_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.51.5
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: dashboard
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
